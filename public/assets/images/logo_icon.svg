<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Dark Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    
    <!-- Neon Coral Glow Gradient -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffedd5" stop-opacity="1" />
      <stop offset="30%" stop-color="#f97316" stop-opacity="1" />
      <stop offset="100%" stop-color="#ec4899" stop-opacity="1" />
    </linearGradient>

    <!-- Radial Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Rounded Square Border Container -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="8" />

  <!-- Subtle Radial Ambient Light Behind Dumbbell -->
  <circle cx="256" cy="256" r="160" fill="#f97316" fill-opacity="0.04" filter="blur(20px)" />
  
  <!-- Glowing Hexagonal Outer Frame -->
  <polygon points="256,70 417,163 417,349 256,442 95,349 95,163" 
           fill="none" stroke="url(#glowGrad)" stroke-width="6" opacity="0.3" />

  <!-- Dumbbell Icon Group with Neon Glow Filter -->
  <g filter="url(#neonGlow)">
    <!-- Dumbbell Bar -->
    <rect x="120" y="236" width="272" height="40" rx="10" fill="url(#glowGrad)" />
    
    <!-- Left Plate (Inner Large) -->
    <rect x="140" y="146" width="30" height="220" rx="15" fill="url(#glowGrad)" />
    
    <!-- Left Plate (Middle) -->
    <rect x="100" y="176" width="30" height="160" rx="12" fill="url(#glowGrad)" />

    <!-- Left Plate (Outer Small) -->
    <rect x="70" y="206" width="20" height="100" rx="8" fill="url(#glowGrad)" />
    
    <!-- Right Plate (Inner Large) -->
    <rect x="342" y="146" width="30" height="220" rx="15" fill="url(#glowGrad)" />
    
    <!-- Right Plate (Middle) -->
    <rect x="382" y="176" width="30" height="160" rx="12" fill="url(#glowGrad)" />

    <!-- Right Plate (Outer Small) -->
    <rect x="422" y="206" width="20" height="100" rx="8" fill="url(#glowGrad)" />

    <!-- Center Grip Ridges -->
    <line x1="216" y1="236" x2="216" y2="276" stroke="#020617" stroke-width="4" />
    <line x1="236" y1="236" x2="236" y2="276" stroke="#020617" stroke-width="4" />
    <line x1="256" y1="236" x2="256" y2="276" stroke="#020617" stroke-width="4" />
    <line x1="276" y1="236" x2="276" y2="276" stroke="#020617" stroke-width="4" />
    <line x1="296" y1="236" x2="296" y2="276" stroke="#020617" stroke-width="4" />
  </g>
</svg>
